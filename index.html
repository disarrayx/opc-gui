<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPC GUI</title>
    <link rel="stylesheet" href="./styles/index.css" media="all">
</head>

<body>
    <h1>OPC GUI</h1>
    <!-- upload section -->
    <div class="upload-button">
        <p>Upload your .C00/CSV file here.</p>
        <input type="file" id="upload"/>
    </div>
    <h2>Uploaded Files</h2>
    <div class="upload-files">
        <!-- should be generated by the script -->
        <div class="files">
            <div class="file">
                <p>name 1</p>
                <div class="tags">
                    <p>day</p>
                    <p>surface water</p>
                    <p>western</p>
                </div>
            </div>
            <div class="file">
                <p>name 2</p>
                <div class="tags">
                    <p>night</p>
                    <p>deep water</p>
                    <p>central</p>
                </div>
            </div>
        </div>
        <!-- end of files div -->
    </div>

    <!-- loading/processing spinner (hidden by default) -->
    <!-- yoinked from w3schools -->
    <div class="loader"></div>

    <h1>Data</h1>
    <!-- scripts -->
    <p>tables n graphs go here!</p>
    <canvas id="myChart" width="200" height="100"></canvas>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./scripts/chart.js"></script>
    <script src="./scripts/app.js"></script>
</body>
</html>
