<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPC GUI</title>
    <link rel="stylesheet" href="./styles/index.css" media="all">
</head>

<body>
    <div class="main">
    <h1 class="title">Optical Plankton Counter GUI</h1>
    <!-- upload section -->
    <div class="section">
        <div class="upload-button">
            <label class="upload-file" for="file-upload">
                <img src="./styles/assets/svg/upload.svg"/>
                <p>Upload your .C00/CSV file here.</p>
            </label>
            <input type="file" id="file-upload" multiple hidden/>
        </div>
        <div class="upload-files-header">
            <h2>Uploaded Files —</h2>
            <h2 id="uploaded-files-count">0</h2>
            <h2>uploaded</h2>
        </div>
        <div class="upload-files">
            <!-- should be generated by the script -->
            <div class="files">
            </div>
        </div>
        <!-- end of upload files div -->
        <div class="submit-section">
            <button type="button" id="submit-files" class="submit-button">
                Process Files
            </button>
        </div>
    </div>

    <!-- visualisations section -->
     <div class="section">
        <div class="col-group">
            <h2>Visualisations</h2>
            <p class="text-deemph">Select a label to filter views. Displays all graphs by default.</p>
        </div>
        <div class="col-group">
            <p class="text-deemph">Site selection</p>
            <!-- site selection choices -->
            <div class="row-group">
                <label class="selection">
                    <input type="radio" id="site-averaged" name="site-select">
                    Averaged over sites
                </label>
                <p class="text-deemph">or</p>
                <label class="row-group">
                    <input type="radio" id="site-specific" name="site-select">
                    <div class="row-group">
                        <p>Select specific sites</p>
                        <img src="./styles/assets/svg/chevron-down.svg"/>
                    </div>
                </label>
            </div>
            <!-- data split -->
            <div class="col-group">
                <p class="text-deemph">Data split</p>
                <div class="row-group">
                    <label class="selection">
                        <input type="radio" id="data-per" name="data-split">
                        Per sample
                    </label>
                    <p class="text-deemph">or</p>
                    <div class="selection">
                        <label class="selection">
                            <input type="checkbox" id="data-dvn" name="data-split">
                            Day vs night
                        </label>
                        <label class="selection">
                            <input type="checkbox" id="data-svd" name="data-split">
                            Surface vs deep
                        </label>
                        <label class="selection">
                            <input type="checkbox" id="data-wvc" name="data-split">
                            Western vs central
                        </label>
                        </div>
                </div>
            </div>
            <!-- graphs -->
             <div class="col-group">
                 <canvas id="myChart" width="300" height="100"></canvas>
             </div>
        </div>
     </div>
     </div>

    <!-- popup -->
     <div class="overlay">
        <div id="upload-file" class="popup">
            <div class="col-group">
                <h1>Upload File</h1>
                <div class="row-group">
                    <p class="text-deemph">Uploading file </p>
                    <p id="popup-filename"></p>
                </div>
            </div>
            <div class="popup-select">
            <p>Select file details</p>
            <form id="optionsForm" class="options-container">
            <div class="options">
                <div class="radio-option">
                    <label for="opt1-west">
                        <input type="radio" id="opt1-west" name="option1" value="west">
                        West
                    </label>
                </div>
                <div class="radio-option">
                    <label for="opt1-cent">
                        <input type="radio" id="opt1-cent" name="option1" value="central">
                        Central
                    </label>
                </div>
            </div>
        <div class="options">
            <div class="radio-option">
                <label for="opt2-day">
                    <input type="radio" id="opt2-day" name="option2" value="day">
                    Day
                </label>
            </div>
            <div class="radio-option">
                <label for="opt2-night">
                    <input type="radio" id="opt2-night" name="option2" value="night">
                    Night
                </label>
            </div>
        </div>

        <div class="options">
            <div class="radio-option">
                <label for="opt3-surf">
                    <input type="radio" id="opt3-surf" name="option3" value="surface">
                    Surface
                </label>
            </div>
            <div class="radio-option">
                <label for="opt3-deep">
                    <input type="radio" id="opt3-deep" name="option3" value="deep">
                    Deep
                </label>
            </div>
        </div>

        <div class="options">
            <div class="radio-option">
                <label for="opt4-fri">
                    <input type="radio" id="opt4-fri" name="option4" value="friday">
                    Friday
                </label>
            </div>
            <div class="radio-option">
                <label for="opt4-sat">
                    <input type="radio" id="opt4-sat" name="option4" value="saturday">
                    Saturday
                </label>
            </div>
            <div class="radio-option">
                <label for="opt4-sun">
                    <input type="radio" id="opt4-sun" name="option4" value="sunday">
                    Sunday
                </label>
            </div>
        </div>
        </div>

        <div class="popup-actions">
            <button type="button" class="cancel" onclick="handleCancel()">Cancel</button>
            <button type="submit" class="submit">Upload</button>
        </div>
        </form>
        </div>
     </div>
     <!-- edit popup -->
    

    <!-- loading/processing spinner (hidden by default) -->
    <!-- yoinked from w3schools -->
    <!-- <div class="loader"></div> -->
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.5.3/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./scripts/app.js"></script>
    <script src="./scripts/components.js"></script>

</body>
</html>
