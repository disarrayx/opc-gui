<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPC GUI</title>
    <link rel="stylesheet" href="/styles/index.css" media="all">
</head>

<body>
    <h1 class="title">Optical Plankton Counter GUI</h1>
    <!-- upload section -->
    <div class="section">
        <div class="upload-button">
            <label class="upload-file" for="file-upload">
                <img src="./styles/assets/svg/upload.svg"/>
                <p>Upload your .C00/CSV file here.</p>
            </label>
            <input type="file" id="file-upload" hidden/>
        </div>
        <div class="upload-files-header">
            <h2>Uploaded Files —</h2>
            <h2 id="uploaded-files-count">0</h2>
            <h2>uploaded</h2>
        </div>
        <div class="upload-files">
            <!-- should be generated by the script -->
            <div class="files">
                <file-card fileName="WNS1-F" sample="1" site="western" timeOfDay="night" depth="surface" day="friday"></file-card>
                <file-card fileName="WNS2-F" sample="2" site="western" timeOfDay="night" depth="surface" day="friday"></file-card>
                <file-card fileName="CND1-SAT" sample="1" site="central" timeOfDay="night" depth="deep" day="saturday"></file-card>
                <file-card fileName="CND2-SAT" sample="2" site="central" timeOfDay="night" depth="deep" day="saturday"></file-card>
                <file-card fileName="CDD1-SUN" sample="1" site="central" timeOfDay="day" depth="deep" day="sunday"></file-card>
            </div>
        </div>
        <!-- end of upload files div -->
        <div class="submit-section">
            <button type="button" id="submit-files" class="submit-button">
                Process Files
            </button>
        </div>
    </div>

    <!-- visualisations section -->
     <div class="section">
        <div class="col-group">
            <h2>Visualisations</h2>
            <p class="text-deemph">Select a label to filter views. Displays all graphs by default.</p>
        </div>
        <div class="col-group">
            <p class="text-deemph">Site selection</p>
            <!-- site selection choices -->
            <div class="row-group">
                <label class="selection">
                    <input type="radio" id="site-averaged" name="site-select">
                    Averaged over sites
                </label>
                <p class="text-deemph">or</p>
                <label class="selection">
                    <input type="radio" id="site-specific" name="site-select">
                    <div class="selection">
                        <p>Select specific sites</p>
                        <img src="./styles/assets/svg/chevron-down.svg"/>
                    </div>
                </label>
            </div>
            <!-- data split -->
            <div class="row-group">
                <label class="selection">
                    <input type="radio" id="data-per" name="data-split">
                    Per sample
                </label>
                <p class="text-deemph">or</p>
                <div class="selection">
                    <label class="selection">
                        <input type="checkbox" id="data-dvn" name="data-split">
                        Day vs night
                    </label>
                    <label class="selection">
                        <input type="checkbox" id="data-svd" name="data-split">
                        Surface vs deep
                    </label>
                    <label class="selection">
                        <input type="checkbox" id="data-wvc" name="data-split">
                        Western vs central
                    </label>
                    </div>
            </div>
            <!-- graphs -->
             <div class="col-group">
                 <canvas id="myChart" width="300" height="100"></canvas>
             </div>
        </div>
     </div>

    <!-- loading/processing spinner (hidden by default) -->
    <!-- yoinked from w3schools -->
    <!-- <div class="loader"></div> -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/scripts/chart.js"></script>
    <script src="/scripts/app.js"></script>
    <script src="/scripts/components.js"></script>

</body>
</html>
